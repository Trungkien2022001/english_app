version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: englishapp_postgres
    environment:
      POSTGRES_USER: englishapp
      POSTGRES_PASSWORD: englishapp_secret
      POSTGRES_DB: englishapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - englishapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: englishapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - englishapp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: englishapp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@englishapp.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - englishapp_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  englishapp_network:
    driver: bridge
